{% extends 'core/base.html' %}

{% block title %}Открыть смену - Касса магазина{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5><i class="bi bi-play-circle"></i> Открыть смену</h5>
            </div>
            <div class="card-body">
                {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="opening_cash" class="form-label">Наличные на начало смены</label>
                        <input type="number" class="form-control" id="opening_cash" 
                               name="opening_cash" value="0" step="0.01" min="0">
                        <small class="form-text text-muted">Введите сумму наличных в кассе на начало смены</small>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle"></i> Открыть смену
                        </button>
                        <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">
                            Отмена
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
