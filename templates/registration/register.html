<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Касса магазина</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #198754 0%, #146c43 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .register-card {
            max-width: 500px;
            width: 100%;
        }
        .helptext {
            display: block;
            font-size: 0.85em;
            color: #6c757d;
            margin-top: 5px;
        }
        .errorlist {
            color: #dc3545;
            list-style: none;
            padding-left: 0;
            margin-bottom: 0;
            font-size: 0.85em;
        }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="card shadow-lg border-0 rounded-3">
            <div class="card-body p-4 p-md-5">
                <h2 class="card-title text-center mb-4">
                    <i class="bi bi-person-plus"></i> Регистрация
                </h2>
                
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                            {{ field.errors }}
                            <input type="{{ field.field.widget.input_type|default:'text' }}" 
                                   name="{{ field.name }}" 
                                   id="{{ field.id_for_label }}" 
                                   class="form-control {% if field.errors %}is-invalid{% endif %}"
                                   {% if field.field.required %}required{% endif %}>
                            {% if field.help_text %}
                                <div class="helptext">{{ field.help_text|safe }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    
                    <button type="submit" class="btn btn-success w-100 py-2 mb-3 mt-4">
                        <i class="bi bi-check-circle"></i> Зарегистрироваться
                    </button>
                </form>
                
                <div class="text-center mt-3">
                    <p class="mb-0">Уже есть аккаунт? <a href="{% url 'login' %}" class="text-decoration-none">Войти</a></p>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
